services:
  db:
    image: registry.redhat.io/rhel9/postgresql-15
    environment:
      POSTGRESQL_USER: ${POSTGRESQL_USER:-aap_migration_user}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-redhat123!}
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE:-aap_migration}
      POSTGRESQL_ADMIN_PASSWORD: ${POSTGRESQL_ADMIN_PASSWORD:-redhat123!}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-aap_migration_user} -d ${POSTGRESQL_DATABASE:-aap_migration}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bridge:
    image: localhost/aap-bridge-dev:latest
    build:
      context: .
      dockerfile: Containerfile.dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MIGRATION_STATE_DB_PATH: "postgresql://${POSTGRESQL_USER:-aap_migration_user}:${POSTGRESQL_PASSWORD:-redhat123!}@db:5432/${POSTGRESQL_DATABASE:-aap_migration}"
      AAP_BRIDGE_CONFIG: /app/config/config.yaml
      AAP_BRIDGE_LOG_LEVEL: ${AAP_BRIDGE_LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.containers.internal:host-gateway"
    security_opt:
      - label=disable
    volumes:
      - ./config:/app/config:ro
      - ./exports:/app/exports
      - ./reports:/app/reports
      - bridge-logs:/app/logs
      - ./.secret_key:/app/.secret_key
    working_dir: /app
    entrypoint: ["sleep", "infinity"]

  engine:
    image: localhost/aap-bridge-api:latest
    build:
      context: .
      dockerfile: Containerfile
      target: api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    network_mode: host
    environment:
      MIGRATION_STATE_DB_PATH: "postgresql://${POSTGRESQL_USER:-aap_migration_user}:${POSTGRESQL_PASSWORD:-redhat123!}@localhost:15432/${POSTGRESQL_DATABASE:-aap_migration}"
      AAP_BRIDGE_LOG_LEVEL: ${AAP_BRIDGE_LOG_LEVEL:-INFO}
    security_opt:
      - label=disable
    volumes:
      - ./.secret_key:/app/.secret_key

  ui:
    image: localhost/aap-bridge-ui:latest
    build:
      context: .
      dockerfile: Containerfile.ui
    depends_on:
      - engine
    network_mode: host

volumes:
  pgdata:
  bridge-logs:
