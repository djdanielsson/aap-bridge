---
# Reset a source + target pair from their golden images.
# Destroys running containers and recreates them fresh.
#
# Usage:
#   ansible-playbook playbooks/reset-pair.yml \
#     -e source_version=2.3 \
#     -e target_version=2.6
#
- name: Reset AAP migration test pair
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    pair_id: "{{ source_version | replace('.', '') }}-to-{{ target_version | replace('.', '') }}"

  tasks:
    - name: Load version matrix
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../versions/matrix.yml"

    - name: Reset source instance
      ansible.builtin.include_role:
        name: lifecycle
      vars:
        lifecycle_action: reset
        aap_version: "{{ source_version }}"
        role_suffix: "src"
        container_name: "aap-{{ source_version | replace('.', '') }}-src"

    - name: Reset target instance
      ansible.builtin.include_role:
        name: lifecycle
      vars:
        lifecycle_action: reset
        aap_version: "{{ target_version }}"
        role_suffix: "tgt"
        container_name: "aap-{{ target_version | replace('.', '') }}-tgt"

    - name: Create fresh API tokens
      block:
        - name: Create source token (RPM)
          ansible.builtin.command:
            cmd: >
              podman exec aap-{{ source_version | replace('.', '') }}-src
                awx-manage create_preauth_token --scope write --user admin
          register: src_token
          failed_when: false
          when: aap_versions[source_version].installer.method != 'containerized'

        - name: Create source token (containerized)
          ansible.builtin.command:
            cmd: >
              podman exec --user aap -e XDG_RUNTIME_DIR=/run/user/1000
                aap-{{ source_version | replace('.', '') }}-src
                podman exec automation-controller-web
                  awx-manage create_oauth2_token --user admin
          register: src_token_c
          failed_when: false
          when: aap_versions[source_version].installer.method == 'containerized'

        - name: Set source token result
          ansible.builtin.set_fact:
            src_token: "{{ src_token_c if aap_versions[source_version].installer.method == 'containerized' else src_token }}"

        - name: Create target token (RPM)
          ansible.builtin.command:
            cmd: >
              podman exec aap-{{ target_version | replace('.', '') }}-tgt
                awx-manage create_preauth_token --scope write --user admin
          register: tgt_token
          failed_when: false
          when: aap_versions[target_version].installer.method != 'containerized'

        - name: Create target token (containerized)
          ansible.builtin.command:
            cmd: >
              podman exec --user aap -e XDG_RUNTIME_DIR=/run/user/1000
                aap-{{ target_version | replace('.', '') }}-tgt
                podman exec automation-controller-web
                  awx-manage create_oauth2_token --user admin
          register: tgt_token_c
          failed_when: false
          when: aap_versions[target_version].installer.method == 'containerized'

        - name: Set target token result
          ansible.builtin.set_fact:
            tgt_token: "{{ tgt_token_c if aap_versions[target_version].installer.method == 'containerized' else tgt_token }}"

        - name: Save tokens
          ansible.builtin.copy:
            content: "{{ item.stdout | default('') | trim }}"
            dest: "{{ playbook_dir }}/../generated/pairs/{{ pair_id }}/{{ item.name }}"
            mode: "0600"
          loop:
            - { name: "src_token", stdout: "{{ src_token.stdout | default('') }}" }
            - { name: "tgt_token", stdout: "{{ tgt_token.stdout | default('') }}" }
          when: item.stdout | default('') | length > 0

    - name: Regenerate bridge config with fresh tokens
      ansible.builtin.include_role:
        name: pair_networking
      vars:
        source_version: "{{ source_version }}"
        target_version: "{{ target_version }}"
